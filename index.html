<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Penyimpanan Data Sementara</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    padding: 20px;
}
.container {
    max-width: 600px;
    margin: auto;
    background: #020617;
    padding: 20px;
    border-radius: 10px;
}
h2 { text-align: center; }
input, button {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border-radius: 6px;
    border: none;
}
button {
    background: #2563eb;
    color: white;
    cursor: pointer;
}
button:hover { background: #1d4ed8; }
.file {
    background: #020617;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.file span { font-size: 14px; }
.file button {
    width: auto;
    background: #dc2626;
}
.download {
    background: #16a34a !important;
}
</style>
</head>
<body>

<div class="container">
<h2>📂 Penyimpanan Data Sementara</h2>

<input type="file" id="fileInput" multiple>
<button onclick="saveFiles()">Simpan File</button>

<div id="fileList"></div>
</div>

<script>
let db;
const request = indexedDB.open("TempStorage", 1);

request.onupgradeneeded = e => {
    db = e.target.result;
    db.createObjectStore("files", { keyPath: "name" });
};

request.onsuccess = e => {
    db = e.target.result;
    loadFiles();
};

function saveFiles() {
    const files = document.getElementById("fileInput").files;
    const tx = db.transaction("files", "readwrite");
    const store = tx.objectStore("files");

    for (let file of files) {
        store.put({ name: file.name, data: file });
    }
    setTimeout(loadFiles, 300);
}

function loadFiles() {
    const list = document.getElementById("fileList");
    list.innerHTML = "";
    const tx = db.transaction("files", "readonly");
    const store = tx.objectStore("files");

    store.openCursor().onsuccess = e => {
        const cursor = e.target.result;
        if (cursor) {
            const div = document.createElement("div");
            div.className = "file";
            div.innerHTML = `
                <span>${cursor.value.name}</span>
                <div>
                    <button class="download" onclick="downloadFile('${cursor.value.name}')">⬇</button>
                    <button onclick="deleteFile('${cursor.value.name}')">🗑</button>
                </div>
            `;
            list.appendChild(div);
            cursor.continue();
        }
    };
}

function downloadFile(name) {
    const tx = db.transaction("files", "readonly");
    const store = tx.objectStore("files");
    store.get(name).onsuccess = e => {
        const file = e.target.result.data;
        const url = URL.createObjectURL(file);
        const a = document.createElement("a");
        a.href = url;
        a.download = file.name;
        a.click();
        URL.revokeObjectURL(url);
    };
}

function deleteFile(name) {
    const tx = db.transaction("files", "readwrite");
    tx.objectStore("files").delete(name);
    setTimeout(loadFiles, 300);
}
</script>

</body>
</html>
